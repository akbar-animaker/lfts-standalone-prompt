function LogsTab({ run, onStartRun, onFetchProject, fetching, status, projectId, setProjectId }) {
  const endRef=useRef(null);
  const [clipMode,setClipMode]=useState('both');
  const [saveVer,setSaveVer]=useState(false);
  const busy=run?.status==='running'||fetching;
  useEffect(()=>{ if(endRef.current)endRef.current.scrollIntoView({behavior:'smooth'}); },[run?.logs]);
  const lc={INFO:'text-slate-300',WARNING:'text-amber-400',ERROR:'text-red-400',DEBUG:'text-slate-500'};
  const sc={'PREPROCESS':'text-cyan-400','SEGMENT':'text-sky-400','SPEAKERS':'text-blue-400',
    'CATEGORY':'text-purple-400','SEQ':'text-violet-400','NONSEQ':'text-indigo-400',
    'META':'text-pink-400','RANK':'text-rose-400','AGENT':'text-emerald-400','LLM':'text-yellow-500',
    'DONE':'text-green-400','PIPELINE':'text-teal-400','ERROR':'text-red-400','FRAMES':'text-orange-400'};
  const colorLine=m=>{ const x=m?.match(/\[([A-Z_0-9]+)\]/); return x&&sc[x[1]]?sc[x[1]]:null; };
  return(
    <div className="flex flex-col fade-in" style={{height:'calc(100vh - 112px)'}}>
      <div className="flex items-center gap-3 px-6 py-3 border-b border-border bg-surface flex-shrink-0 flex-wrap">
        <div className="flex items-center gap-2">
          <label className="text-xs text-gray-400">Project ID:</label>
          <input
            value={projectId}
            onChange={e=>setProjectId(e.target.value)}
            onKeyDown={e=>{ if(e.key==='Enter'&&!busy&&projectId.trim()) onFetchProject(projectId,clipMode,saveVer); }}
            placeholder="e.g. 86683kg"
            disabled={busy}
            className="w-40 bg-gray-900 border border-border rounded px-2 py-1 text-sm text-gray-200 outline-none focus:border-accent disabled:opacity-50"/>
          <button onClick={()=>onFetchProject(projectId,clipMode,saveVer)} disabled={busy||!projectId.trim()}
            className={`flex items-center gap-1.5 px-3 py-1 rounded text-sm font-medium transition-colors ${busy||!projectId.trim()?'bg-gray-700 text-gray-500 cursor-not-allowed':'bg-emerald-600 hover:bg-emerald-500 text-white'}`}
            title="Fetch transcript + video from the API and run the pipeline">
            {fetching?'⬇ Fetching…':'⬇ Fetch & Run'}
          </button>
        </div>
        <span className="text-border">|</span>
        <div className="flex items-center gap-2">
          <label className="text-xs text-gray-400">Mode:</label>
          <select className="bg-gray-900 border border-border rounded px-2 py-1 text-sm text-gray-200 outline-none"
            value={clipMode} onChange={e=>setClipMode(e.target.value)} disabled={run?.status==='running'}>
            <option value="both">Both</option>
            <option value="sequential">Sequential only</option>
            <option value="non_sequential">Non-Sequential only</option>
          </select>
        </div>
        <label className="flex items-center gap-1.5 text-xs text-gray-400 cursor-pointer">
          <input type="checkbox" checked={saveVer} onChange={e=>setSaveVer(e.target.checked)} className="accent-violet-500"/>
          Auto-save version before run
        </label>
        <div className="ml-auto flex items-center gap-3">
          {run?.status==='running'&&<span className="flex items-center gap-1.5 text-sm text-yellow-400"><span className="pulse-dot w-2 h-2 rounded-full bg-yellow-400 inline-block"></span>Running…</span>}
          {run?.status==='success'&&<span className="text-sm text-green-400">✓ Completed</span>}
          {run?.status==='error'&&<span className="text-sm text-red-400">✗ Failed</span>}
          <button onClick={()=>onStartRun(clipMode,saveVer)} disabled={run?.status==='running'||!status?.transcript_exists}
            className={`flex items-center gap-2 px-5 py-2 rounded-lg font-semibold text-sm transition-all ${run?.status==='running'||!status?.transcript_exists?'bg-gray-700 text-gray-500 cursor-not-allowed':'bg-accent hover:bg-violet-600 text-white shadow-lg shadow-violet-900/30'}`}>
            <span>▶</span>{run?.status==='running'?'Running…':'Run Pipeline'}
          </button>
        </div>
      </div>
      {!status?.transcript_exists&&(
        <div className="mx-6 mt-3 p-3 rounded bg-red-900/30 border border-red-800 text-sm text-red-300">
          ⚠ Transcript not found: <code className="font-mono ml-1">{status?.transcript_path}</code> — enter a Project ID above to fetch one, or update the path in the Config tab.
        </div>
      )}
      <div className="flex-1 overflow-y-auto px-6 py-4 font-mono text-xs">
        {(!run||run.logs?.length===0)&&(
          <div className="text-gray-600 text-center py-16">Hit <strong className="text-gray-400">Run Pipeline</strong> to stream logs here.</div>
        )}
        {run?.logs?.map((e,i)=>(
          <div key={i} className={`leading-5 ${colorLine(e.message)||lc[e.level]||'text-slate-400'}`}>{e.message}</div>
        ))}
        <div ref={endRef}/>
      </div>
      {run&&(
        <div className="px-6 py-2 border-t border-border bg-surface text-xs text-gray-500 flex items-center justify-between flex-shrink-0">
          <span>Run: <code className="text-gray-400">{run.id}</code></span>
          <div className="flex items-center gap-2">
            <span className="text-gray-600">{run.logs?.length||0} lines</span>
            <button
              onClick={()=>{
                const text=(run.logs||[]).map(e=>e.message).join('\n');
                const blob=new Blob([text],{type:'text/plain'});
                const url=URL.createObjectURL(blob);
                const a=document.createElement('a');
                a.href=url; a.download=`run_log_${run.id}.txt`; a.click();
                URL.revokeObjectURL(url);
              }}
              className="px-2 py-1 rounded bg-gray-700 hover:bg-gray-600 text-gray-300 transition-colors">
              ⬇ Log
            </button>
            <button
              disabled={!run.result}
              onClick={()=>{
                const blob=new Blob([JSON.stringify(run.result,null,2)],{type:'application/json'});
                const url=URL.createObjectURL(blob);
                const a=document.createElement('a');
                a.href=url; a.download=`result_${run.id}.json`; a.click();
                URL.revokeObjectURL(url);
              }}
              className={`px-2 py-1 rounded transition-colors ${run.result?'bg-gray-700 hover:bg-gray-600 text-gray-300':'bg-gray-800 text-gray-600 cursor-not-allowed'}`}>
              ⬇ Raw JSON
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// VIDEO PLAYER
// ─────────────────────────────────────────────────────────────────────────────
function VideoPlayer({ clip, onClose, videoUrl }) {
  const videoRef=useRef(null);
  const [ready,setReady]=useState(false);
  const clipRef=useRef(clip);
  useEffect(()=>{ clipRef.current=clip; },[clip]);

  // Seek + play whenever clip changes
  useEffect(()=>{
    if(!clip||!videoRef.current)return;
    const seekPlay=()=>{
      const st = clip.video_start_time ?? clip.start_time ?? 0;
      videoRef.current.currentTime=st;
      videoRef.current.play().catch(()=>{});
    };
    if(videoRef.current.readyState>=2) seekPlay();
    else videoRef.current.addEventListener('loadeddata',seekPlay,{once:true});
  },[clip]);

  const endTime = clip?.video_end_time ?? clip?.end_time ?? Infinity;

  const handleTimeUpdate=()=>{
    if(!videoRef.current)return;
    if(videoRef.current.currentTime>=endTime) videoRef.current.pause();
  };

  const jumpStart=()=>{
    if(!videoRef.current||!clip)return;
    const st=clip.video_start_time??clip.start_time??0;
    videoRef.current.currentTime=st;
    videoRef.current.play().catch(()=>{});
  };

  const startT=(clip?.video_start_time??clip?.start_time??0).toFixed(1);
  const endT=(clip?.video_end_time??clip?.end_time??0).toFixed(1);
  const dur=((clip?.video_end_time??clip?.end_time??0)-(clip?.video_start_time??clip?.start_time??0)).toFixed(1);

  return(
    <div className="fixed bottom-4 right-4 z-40 w-[380px] bg-[#12121f] border border-border rounded-xl shadow-2xl overflow-hidden fade-in">
      <div className="flex items-center justify-between px-3 py-2 border-b border-border">
        <div className="flex items-center gap-2 min-w-0">
          <span className="text-sm">🎬</span>
          <span className="text-xs text-gray-200 truncate font-medium">{clip?.title||'Clip Preview'}</span>
        </div>
        <div className="flex items-center gap-2 flex-shrink-0">
          <span className="text-xs text-gray-500 font-mono">{startT}s – {endT}s</span>
          <button onClick={onClose} className="text-gray-500 hover:text-gray-300 text-base ml-1">✕</button>
        </div>
      </div>
      <video ref={videoRef} src={videoUrl||'/api/video'} onTimeUpdate={handleTimeUpdate}
        onLoadedData={()=>setReady(true)} controls
        className="w-full block" style={{maxHeight:'210px',background:'#000'}}/>
      <div className="flex items-center justify-between px-3 py-2 bg-surface">
        <button onClick={jumpStart} className="text-xs text-violet-300 hover:text-violet-200 flex items-center gap-1">
          ⟳ Jump to clip start ({startT}s)
        </button>
        <span className="text-xs text-gray-500">{dur}s clip</span>
      </div>
      {/* Non-seq segment info */}
      {clip?.clips && clip.clips.length > 1 && (
        <div className="px-3 pb-3">
          <div className="text-xs text-gray-500 mb-1.5">Segments in this clip:</div>
          <div className="flex flex-wrap gap-1" style={{whiteSpace:'nowrap', maxHeight: '100px', overflowY: 'scroll'}}>
            {clip.clips.map((c,i)=>(
              <button key={i} onClick={()=>{
                if(videoRef.current){videoRef.current.currentTime=c.startTime??c.start_time??0;videoRef.current.play().catch(()=>{});}
              }}
                className="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300 px-2 py-0.5 rounded transition-colors">
                {(c.startTime??c.start_time??0).toFixed(0)}s–{(c.endTime??c.end_time??0).toFixed(0)}s
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// STAGE FLOW TABLE
// ─────────────────────────────────────────────────────────────────────────────
function StageFlowTable({ run }) {
  const result = run?.result;
  const logs   = run?.logs || [];

  const seqClips = result?.sequential_clips || [];
  const nonSeq   = result?.non_sequential_shorts || [];
  const avgScore = arr => arr.length
    ? Math.round(arr.reduce((s,c)=>s+(c.confidence_score||0),0)/arr.length) : 0;

  const stageRows = useMemo(() => {
    const msgs = logs.map(l=>l.message||'');
    const seen  = p => msgs.some(m=>p.test(m));
    const extract = (list, re) => { for(const m of list){ const x=m.match(re); if(x) return x[1]||x[2]||x[3]||x[0]; } return null; };

    const hasCat  = seen(/\[CATEGORY\]/i);
    const hasPre  = seen(/\[PREPROCESS\]/i);
    const hasSpk  = seen(/\[SPEAKERS\]/i);
    const hasSeg  = seen(/\[SEGMENT\]/i);
    const hasSeq  = seen(/\[SEQ\]/i);
    const hasSeqR = seen(/\[SEQ\].*refin/i);
    const hasNS   = seen(/\[NONSEQ\]/i);
    const hasNSR  = seen(/\[NONSEQ\].*refin/i);
    const hasMeta = seen(/\[META\]/i);
    const hasRank = seen(/\[RANK\]/i);

    const sentN = extract(msgs, /(\d[\d,]*)\s+sentence/i);
    const spkN  = extract(msgs, /(\d+)\s+unique\s+speaker|detected\s+(\d+)\s+speaker|(\d+)\s+speaker/i);
    const candN = extract(msgs, /(\d[\d,]*)\s+candidate/i);

    const isDone = run?.status==='success';
    const isRun  = run?.status==='running';
    const st = (condDone, condSeen) => condDone?'done': condSeen?'seen': isRun?'pending':'idle';

    return [
      {
        stage:'0', icon:'🏷️', name:'Category Detection',
        status: st(!!result?.video_category, hasCat),
        output: result?.video_category || null,
        detail: result?.dimension_weights
          ? Object.entries(result.dimension_weights).map(([k,v])=>`${k.replace(/_/g,' ')} ${v}%`).join(' · ')
          : null,
      },
      {
        stage:'1', icon:'⚙️', name:'Preprocess',
        status: st(!!result?.video_duration, hasPre),
        output: result?.video_duration
          ? `${result.video_duration.toFixed(1)}s · ${result.language_code||'en'}`
          : (sentN ? `${parseInt(sentN.replace(/,/g,'')).toLocaleString()} sentences` : (hasPre?'Completed':null)),
        detail: sentN ? `${parseInt(sentN.replace(/,/g,'')).toLocaleString()} sentences detected` : null,
      },
      {
        stage:'1b', icon:'🎙️', name:'Speaker Detection',
        status: st(hasSpk||isDone, hasSpk),
        output: spkN ? `${spkN} speaker(s) identified` : (hasSpk?'Completed':null),
        detail: null,
      },
      {
        stage:'2', icon:'✂️', name:'Segmentation',
        status: st(hasSeg||isDone, hasSeg),
        output: candN ? `${parseInt(candN.replace(/,/g,'')).toLocaleString()} candidate windows` : (hasSeg?'Completed':null),
        detail: null,
      },
      {
        stage:'3a', icon:'🤖', name:'Sequential Selection (Agent #1)',
        status: st(result?.sequential_clips!=null, hasSeq),
        output: result?.sequential_clips!=null
          ? `${seqClips.length} clip${seqClips.length!==1?'s':''} selected`
          : (hasSeq?'Running…':null),
        detail: null,
      },
      {
        stage:'3a', icon:'🔧', name:'Sequential Refinement (Agent #3)',
        status: st(result?.sequential_clips!=null, hasSeqR),
        output: result?.sequential_clips!=null
          ? (seqClips.length>0
              ? `${seqClips.length} clips · avg score ${avgScore(seqClips)}/100`
              : '0 clips after refinement')
          : (hasSeqR?'Running…':null),
        detail: seqClips.length>0
          ? `Scores: ${seqClips.map(c=>c.confidence_score).join(', ')}`
          : null,
      },
      {
        stage:'3b', icon:'🤖', name:'Non-Seq Selection (Agent #2)',
        status: st(result?.non_sequential_shorts!=null, hasNS),
        output: result?.non_sequential_shorts!=null
          ? `${nonSeq.length} short${nonSeq.length!==1?'s':''} selected`
          : (hasNS?'Running…':null),
        detail: null,
      },
      {
        stage:'3b', icon:'🔧', name:'Non-Seq Refinement (Agent #4)',
        status: st(result?.non_sequential_shorts!=null, hasNSR),
        output: result?.non_sequential_shorts!=null
          ? (nonSeq.length>0
              ? `${nonSeq.length} shorts · avg score ${avgScore(nonSeq)}/100`
              : '0 shorts after refinement')
          : (hasNSR?'Running…':null),
        detail: nonSeq.length>0
          ? `Scores: ${nonSeq.map(c=>c.confidence_score).join(', ')}`
          : null,
      },
      {
        stage:'⭐', icon:'⭐', name:'Scorer (used by #3 & #4)',
        status: st((seqClips.length+nonSeq.length)>0, seen(/\[SCORER\]/i)),
        output: (seqClips.length+nonSeq.length)>0
          ? `Applied to ${seqClips.length+nonSeq.length} clip(s)`
          : (seen(/\[SCORER\]/i)?'Completed':null),
        detail: null,
      },
      {
        stage:'4', icon:'📋', name:'Metadata (Agent #5)',
        status: st(hasMeta||isDone, hasMeta),
        output: (seqClips.length+nonSeq.length)>0
          ? `${seqClips.length+nonSeq.length} clips titled & platform-tagged`
          : (hasMeta?'Completed':null),
        detail: null,
      },
      {
        stage:'5', icon:'📊', name:'Ranking',
        status: st(hasRank||isDone, hasRank),
        output: (isDone||result)
          ? `${seqClips.length} sequential · ${nonSeq.length} non-sequential`
          : (hasRank?'Completed':null),
        detail: null,
      },
    ];
  }, [logs, result, run?.status]);

  const completedCount = stageRows.filter(r=>r.status==='done'||r.status==='seen').length;

  const StatusBadge = ({s}) => {
    if(s==='done')    return <span className="text-green-400 font-bold">✓</span>;
    if(s==='seen')    return <span className="text-yellow-400">✓</span>;
    if(s==='pending') return <span className="pulse-dot text-yellow-400 text-xs">●</span>;
    return <span className="text-gray-600">–</span>;
  };

  return (
    <div className="max-w-3xl">
      <div className="rounded-lg border border-border overflow-hidden">
        <div className="px-4 py-2.5 bg-surface border-b border-border flex items-center justify-between">
          <span className="text-sm font-semibold text-gray-200">Stage-by-Stage Pipeline Outputs</span>
          <span className="text-xs text-gray-500 flex items-center gap-2">
            {completedCount}/{stageRows.length} stages completed
            {run?.status==='running'&&<span className="pulse-dot text-yellow-400">● running</span>}
          </span>
        </div>
        <table className="w-full">
          <thead>
            <tr className="border-b border-border bg-[#13131f]">
              <th className="px-3 py-2 text-left text-xs text-gray-500 font-medium w-10">#</th>
              <th className="px-3 py-2 text-left text-xs text-gray-500 font-medium">Stage</th>
              <th className="px-3 py-2 text-center text-xs text-gray-500 font-medium w-16">Status</th>
              <th className="px-3 py-2 text-left text-xs text-gray-500 font-medium">Output</th>
            </tr>
          </thead>
          <tbody>
            {stageRows.map((row,i)=>(
              <tr key={i}
                className={`border-b border-border/40 transition-opacity ${row.status==='idle'?'opacity-30':''}`}>
                <td className="px-3 py-2.5 text-xs font-mono text-gray-500">{row.stage}</td>
                <td className="px-3 py-2.5">
                  <div className="flex items-center gap-2">
                    <span className="text-sm flex-shrink-0">{row.icon}</span>
                    <span className="text-xs text-gray-300 font-medium">{row.name}</span>
                  </div>
                </td>
                <td className="px-3 py-2.5 text-center text-sm">
                  <StatusBadge s={row.status}/>
                </td>
                <td className="px-3 py-2.5">
                  {row.output ? (
                    <div>
                      <div className={`text-xs font-medium ${row.status==='done'?'text-gray-100':'text-gray-400'}`}>
                        {row.output}
                      </div>
                      {row.detail&&(
                        <div className="text-xs text-gray-500 mt-0.5 leading-4 break-all max-w-sm">
                          {row.detail}
                        </div>
                      )}
                    </div>
                  ):(
                    <span className="text-xs text-gray-600 italic">
                      {row.status==='pending'?'Running…':'Awaiting run'}
                    </span>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// INLINE CLIP PLAYER (used inside ClipDetailPanel)
// ─────────────────────────────────────────────────────────────────────────────
function InlineClipPlayer({ clip, videoUrl }) {
  const videoRef = useRef(null);
  const clipRef  = useRef(clip);

  useEffect(()=>{
    clipRef.current = clip;
    if(videoRef.current){
      const start = clip?.video_start_time ?? 0;
      videoRef.current.currentTime = start;
    }
  },[clip]);

  const handleLoadedData = ()=>{
    const start = clipRef.current?.video_start_time ?? 0;
    if(videoRef.current) videoRef.current.currentTime = start;
  };

  const handleTimeUpdate = ()=>{
    const end = clipRef.current?.video_end_time ?? Infinity;
    if(videoRef.current && end < Infinity && videoRef.current.currentTime >= end)
      videoRef.current.pause();
  };

  return(
    <video ref={videoRef} src={videoUrl} onLoadedData={handleLoadedData}
      onTimeUpdate={handleTimeUpdate} controls
      className="w-full block" style={{maxHeight:'190px',background:'#000'}}/>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// CLIP DETAIL PANEL
// ─────────────────────────────────────────────────────────────────────────────
function ClipDetailPanel({ clip, videoUrl, videoAvailable, onClose }) {
  const isSeq  = clip._type === 'sequential';
  const score  = clip.confidence_score ?? 0;
  const sc     = s=>s>=80?'text-green-400':s>=65?'text-yellow-400':'text-red-400';
  const pb     = p=>{
    const c={youtube:'bg-red-900/40 text-red-300',instagram:'bg-pink-900/40 text-pink-300',
             tiktok:'bg-blue-900/40 text-blue-300',linkedin:'bg-sky-900/40 text-sky-300'};
    return c[p?.toLowerCase()]||'bg-gray-700 text-gray-300';
  };
  const transcript = clip._text || clip.text || '';

  return(
    <div className="w-96 border-l border-border flex flex-col bg-surface flex-shrink-0 overflow-hidden fade-in">
      {/* Header */}
      <div className="flex items-start gap-2 px-4 py-3 border-b border-border flex-shrink-0">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 mb-1">
            <span className={`text-2xl font-bold ${sc(score)}`}>{score}</span>
            <span className={`text-xs px-2 py-0.5 rounded font-semibold ${isSeq?'bg-violet-900/50 text-violet-300':'bg-teal-900/50 text-teal-300'}`}>
              {isSeq?'SEQ':'NON-SEQ'}
            </span>
          </div>
          <p className="text-sm font-medium text-gray-200 leading-snug">{clip.title||'Untitled'}</p>
          <p className="text-xs text-gray-500 mt-0.5">
            {isSeq
              ? `${(clip.video_start_time??0).toFixed(1)}s – ${(clip.video_end_time??0).toFixed(1)}s · ${((clip.video_end_time||0)-(clip.video_start_time||0)).toFixed(1)}s`
              : `${(clip.total_duration??clip._dur??0).toFixed?.(1)||0}s total · ${clip.num_clips||clip.clips?.length||0} segments`}
          </p>
        </div>
        <button onClick={onClose} className="text-gray-600 hover:text-gray-300 flex-shrink-0 text-lg leading-none">✕</button>
      </div>

      {/* Inline video */}
      {videoAvailable&&(
        <div className="flex-shrink-0 bg-black">
          <InlineClipPlayer clip={clip} videoUrl={videoUrl}/>
        </div>
      )}

      {/* Scrollable details */}
      <div className="flex-1 overflow-y-auto divide-y divide-border/40">

        {/* Platforms */}
        {(clip.social_media||[]).length>0&&(
          <div className="px-4 py-3 flex flex-wrap gap-1">
            {(clip.social_media||[]).map(p=>(
              <span key={p} className={`text-xs px-2 py-0.5 rounded font-medium ${pb(p)}`}>{p}</span>
            ))}
          </div>
        )}

        {/* Reason */}
        {clip.reason&&(
          <div className="px-4 py-3">
            <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Reason</div>
            <p className="text-xs text-gray-300 leading-relaxed">{clip.reason}</p>
          </div>
        )}

        {/* Transcript */}
        {(transcript||(clip.clips&&clip.clips.length>0))&&(
          <div className="px-4 py-3">
            <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Transcript</div>
            {isSeq?(
              <p className="text-xs text-gray-300 leading-relaxed bg-gray-900/50 rounded p-2">{transcript}</p>
            ):(
              <div className="space-y-2">
                {(clip.clips||[]).map((c,j)=>(
                  <div key={j} className="bg-gray-900/60 rounded p-2">
                    <div className="flex items-center gap-2 mb-1">
                      <span className="text-xs font-semibold text-violet-400">Seg {j+1}</span>
                      <span className="text-xs font-mono text-gray-500">{(c.startTime??c.start_time??0).toFixed(1)}s–{(c.endTime??c.end_time??0).toFixed(1)}s</span>
                    </div>
                    <p className="text-xs text-gray-300 leading-relaxed">{c.text||''}</p>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* Score breakdown */}
        {clip.score_breakdown&&(
          <div className="px-4 py-3">
            <div className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Score Breakdown</div>
            <div className="grid grid-cols-2 gap-2">
              {Object.entries(clip.score_breakdown).map(([dim,s])=>(
                <div key={dim} className="bg-gray-900 rounded p-2 text-xs">
                  <div className="text-gray-500 capitalize mb-0.5">{dim.replace(/_/g,' ')}</div>
                  <div className={`font-bold text-base ${sc(s*5)}`}>{s}</div>
                  {clip.score_reasoning?.[dim]&&<p className="text-gray-600 text-xs mt-1 leading-3">{clip.score_reasoning[dim]}</p>}
                </div>
              ))}
            </div>
            {clip.weakest_factor&&<p className="text-amber-400 text-xs mt-2">⚠ Weakest: {clip.weakest_factor}</p>}
          </div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// OUTPUT TAB
// ─────────────────────────────────────────────────────────────────────────────
function OutputTab({ run, videoAvailable }) {
  const [view,setView]=useState('summary');
  const [sortField,setSortField]=useState('score');
  const [sortDir,setSortDir]=useState('desc');
  const [selectedClip,setSelectedClip]=useState(null);

  // ── Run history ───────────────────────────────────────────────────────────
  const [runList,setRunList]=useState([]);
  const [selRunId,setSelRunId]=useState(null);
  const [selResult,setSelResult]=useState(null);
  const [loadingRes,setLoadingRes]=useState(false);

  const refreshList=()=>api.get('/runs').then(d=>setRunList(d.runs||[])).catch(()=>{});

  const loadRun=async(runId)=>{
    if(!runId)return;
    // Use in-memory result for current live run
    if(runId===run?.id && run?.result){ setSelRunId(runId);setSelResult(run.result);return; }
    setLoadingRes(true);
    try{
      const r=await api.get(`/runs/${runId}/result`);
      setSelRunId(runId); setSelResult(r);
    }catch(e){ setSelResult(null); }
    finally{ setLoadingRes(false); }
  };

  // On mount: load list, auto-select newest
  useEffect(()=>{
    api.get('/runs').then(d=>{
      const list=d.runs||[];
      setRunList(list);
      if(list.length>0 && !selRunId) loadRun(list[0].run_id);
    }).catch(()=>{});
  },[]);

  // When live run completes: refresh list + select it
  useEffect(()=>{
    if(run?.result && run?.id){
      setSelRunId(run.id); setSelResult(run.result);
      refreshList();
    }
  },[run?.result]);

  const result=selResult;

  // Per-run video URL — isolates each user's video from the global config
  const runVideoUrl = selRunId ? `/api/runs/${selRunId}/video` : null;
  const [runVideoAvailable, setRunVideoAvailable] = useState(false);
  // Clear selected clip when switching runs
  useEffect(()=>{ setSelectedClip(null); },[selRunId]);

  useEffect(()=>{
    if(!selRunId){ setRunVideoAvailable(false); return; }
    fetch(`/api/runs/${selRunId}/video`,{method:'HEAD'})
      .then(r=>setRunVideoAvailable(r.ok))
      .catch(()=>setRunVideoAvailable(false));
  },[selRunId]);

  const seqClips=(result?.sequential_clips)||[];
  const nonSeqShorts=(result?.non_sequential_shorts)||[];
  const usage=(result?.token_usage)||{};

  const sortClips=(clips)=>{
    const key = sortField==='score'?'confidence_score':sortField==='time'?'video_start_time':'video_start_time';
    const durKey= sortField==='duration'?'duration':null;
    return [...clips].sort((a,b)=>{
      let av=durKey?(a.video_end_time-a.video_start_time):(a[key]??0);
      let bv=durKey?(b.video_end_time-b.video_start_time):(b[key]??0);
      return sortDir==='desc'?bv-av:av-bv;
    });
  };
  const sortNonSeq=(shorts)=>{
    const key=sortField==='score'?'confidence_score':sortField==='duration'?'total_duration':'confidence_score';
    return [...shorts].sort((a,b)=>sortDir==='desc'?b[key]-a[key]:a[key]-b[key]);
  };

  const scoreColor=s=>s>=80?'text-green-400':s>=65?'text-yellow-400':'text-red-400';
  const platBadge=p=>{
    const c={youtube:'bg-red-900/40 text-red-300',instagram:'bg-pink-900/40 text-pink-300',
      tiktok:'bg-blue-900/40 text-blue-300',linkedin:'bg-sky-900/40 text-sky-300'};
    return c[p?.toLowerCase()]||'bg-gray-700 text-gray-300';
  };

  const SortBar=()=>(
    <div className="flex items-center gap-3 flex-wrap">
      <span className="text-xs text-gray-500">Sort by:</span>
      {['score','time','duration'].map(f=>(
        <button key={f} onClick={()=>setSortField(f)}
          className={`text-xs px-2.5 py-1 rounded transition-colors capitalize ${sortField===f?'bg-accent text-white':'bg-gray-800 text-gray-400 hover:text-gray-200'}`}>
          {f}
        </button>
      ))}
      <button onClick={()=>setSortDir(d=>d==='desc'?'asc':'desc')}
        className="text-xs px-2.5 py-1 rounded bg-gray-800 text-gray-400 hover:text-gray-200 transition-colors">
        {sortDir==='desc'?'↓ High → Low':'↑ Low → High'}
      </button>
    </div>
  );

  return(
    <div className="fade-in flex" style={{height:'calc(100vh - 112px)'}}>

      {/* ── Run history sidebar ── */}
      <div className="w-52 flex-shrink-0 border-r border-border flex flex-col bg-surface/40">
        <div className="px-3 py-2 border-b border-border flex items-center justify-between flex-shrink-0">
          <span className="text-xs font-semibold text-gray-400 uppercase tracking-wide">Run History</span>
          <button onClick={refreshList} className="text-xs text-gray-600 hover:text-gray-400 transition-colors" title="Refresh list">↻</button>
        </div>
        {selRunId&&(
          <div className="px-3 py-2 border-b border-border flex-shrink-0">
            <a href={`/api/runs/${selRunId}/bundle`} download
              className="w-full flex items-center justify-center gap-1.5 px-2 py-1.5 rounded text-xs font-medium bg-violet-900/40 hover:bg-violet-800/60 text-violet-300 hover:text-violet-100 border border-violet-700/40 transition-all">
              📦 Dev Analyse
            </a>
          </div>
        )}
        <div className="flex-1 overflow-y-auto">
          {runList.length===0?(
            <div className="p-4 text-xs text-gray-600 text-center">No saved runs yet.</div>
          ):(
            runList.map(r=>{
              const isSel=selRunId===r.run_id;
              const isLive=r.run_id===run?.id;
              const dt=r.start_time?new Date(r.start_time):null;
              return(
                <button key={r.run_id} onClick={()=>loadRun(r.run_id)}
                  className={`w-full text-left px-3 py-2.5 border-b border-border/40 transition-all ${isSel?'bg-accent/20 border-l-2 border-l-accent':'hover:bg-surface'}`}>
                  <div className="flex items-center gap-1.5">
                    <span className={`w-1.5 h-1.5 rounded-full flex-shrink-0 ${r.status==='success'?'bg-green-400':r.status==='error'?'bg-red-400':'bg-yellow-400'}`}/>
                    <span className={`text-xs font-mono ${isSel?'text-violet-300':'text-gray-300'}`}>{r.run_id}</span>
                    {isLive&&<span className="ml-auto text-xs text-violet-400">live</span>}
                  </div>
                  {dt&&<div className="text-xs text-gray-500 mt-0.5 pl-3">{dt.toLocaleDateString()} {dt.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>}
                  {r.summary&&r.summary.sequential_count!==undefined&&(
                    <div className="text-xs text-gray-600 mt-0.5 pl-3">
                      {r.summary.sequential_count}s · {r.summary.non_sequential_count}n · {r.summary.category||''}
                    </div>
                  )}
                </button>
              );
            })
          )}
        </div>
      </div>

      {/* ── Result viewer ── */}
      <div className="flex-1 flex flex-col overflow-hidden">
        <div className="flex border-b border-border bg-surface px-4 gap-1 flex-shrink-0 flex-wrap">
          {[
            {key:'stages',       label:'Stage Flow 🔢'},
            {key:'summary',      label:'Summary'},
            {key:'all',          label:`All Shorts (${((result?.sequential_clips||[]).length)+((result?.non_sequential_shorts||[]).length)})`},
            {key:'sequential',   label:`Sequential (${(result?.sequential_clips||[]).length})`},
            {key:'nonsequential',label:`Non-Sequential (${(result?.non_sequential_shorts||[]).length})`},
            {key:'tokens',       label:'Tokens'},
            {key:'raw',          label:'Raw JSON'},
          ].map(t=>(
            <button key={t.key} onClick={()=>setView(t.key)}
              className={`px-3 py-2.5 text-sm transition-all tab-btn ${view===t.key?'active':''}`}>
              {t.label}
            </button>
          ))}
        </div>

        {loadingRes&&(
          <div className="flex-1 flex items-center justify-center text-gray-500 text-sm">Loading result…</div>
        )}

        {!loadingRes&&!result&&!run&&(
          <div className="flex-1 flex flex-col items-center justify-center text-gray-600 fade-in">
            <div className="text-5xl mb-4">📭</div>
            <p>No runs yet. Run the pipeline first.</p>
          </div>
        )}

      <div className={`flex-1 flex overflow-hidden ${loadingRes||(!result&&!run)?'hidden':''}`}>
      <div className="flex-1 overflow-y-auto p-6 pb-20">
        {/* ── Stage Flow ── */}
        {view==='stages'&&<StageFlowTable run={run}/>}

        {/* ── Summary ── */}
        {view==='summary'&&result&&(
          <div className="space-y-4 max-w-3xl">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
              {[['Category',result.video_category,'🏷️'],
                ['Duration',`${(result.video_duration||0).toFixed(1)}s`,'⏱️'],
                ['Sequential',seqClips.length,'🎬'],
                ['Non-Sequential',nonSeqShorts.length,'✂️']].map(([l,v,i])=>(
                <div key={l} className="p-4 rounded-lg border border-border bg-surface">
                  <div className="text-2xl mb-1">{i}</div>
                  <div className="text-xl font-bold text-gray-100">{v}</div>
                  <div className="text-xs text-gray-400">{l}</div>
                </div>
              ))}
            </div>
            <div className="p-4 rounded-lg border border-border bg-surface">
              <div className="text-xs font-medium text-gray-400 mb-2">CATEGORY REASONING</div>
              <p className="text-sm text-gray-300">{result.category_reason}</p>
            </div>
            {result.dimension_weights&&(
              <div className="p-4 rounded-lg border border-border bg-surface">
                <div className="text-xs font-medium text-gray-400 mb-3">DYNAMIC SCORING WEIGHTS</div>
                <div className="space-y-2">
                  {Object.entries(result.dimension_weights).map(([dim,w])=>(
                    <div key={dim} className="flex items-center gap-3">
                      <div className="text-xs text-gray-400 w-36 capitalize">{dim.replace(/_/g,' ')}</div>
                      <div className="flex-1 bg-gray-800 rounded-full h-2">
                        <div className="h-2 rounded-full bg-accent" style={{width:`${w}%`}}/>
                      </div>
                      <div className="text-xs text-gray-300 w-8 text-right">{w}%</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {nonSeqShorts.length===0&&(
              <div className="p-4 rounded-lg border border-amber-800/40 bg-amber-900/10">
                <div className="text-xs font-medium text-amber-400 mb-1">ℹ Non-Sequential: 0 clips generated</div>
                <p className="text-xs text-amber-200/70 leading-5">
                  Agent #2 returned candidates but none could be assembled. This happens when the LLM returns sentence IDs like "S1", "S2" (with an "S" prefix) instead of plain integers.
                  A fix is patched in runner.py — the next run should produce non-sequential clips. If you still see 0, try running with CLIP_MODE = "non_sequential" to isolate the issue.
                </p>
              </div>
            )}
          </div>
        )}

        {/* ── All Shorts ── */}
        {view==='all'&&result&&(()=>{
          const allShorts=[
            ...seqClips.map(c=>({...c,_type:'sequential',_dur:((c.video_end_time||0)-(c.video_start_time||0)).toFixed(1),_text:c.text})),
            ...nonSeqShorts.map(s=>({...s,_type:'nonsequential',_dur:(s.total_duration||0).toFixed(1),_text:(s.clips||[]).map(c=>c.text).join(' … ')})),
          ].sort((a,b)=>(b.confidence_score||0)-(a.confidence_score||0));
          return(
            <div className="max-w-3xl space-y-3">
              <p className="text-xs text-gray-500 mb-4">
                All {allShorts.length} clips across both pipelines — ranked by score.
              </p>
              {allShorts.length===0&&<p className="text-gray-500">No clips generated.</p>}
              {allShorts.map((item,i)=>{
                const isSeq=item._type==='sequential';
                const isSel=isSeq
                  ? selectedClip?.video_start_time===item.video_start_time
                  : selectedClip?.short_id===item.short_id;
                return(
                  <div key={i} onClick={()=>setSelectedClip(item)} className={`rounded-lg border bg-surface clip-card overflow-hidden cursor-pointer transition-all ${isSel?'border-accent ring-1 ring-accent/40':'border-border hover:border-gray-600'}`}>
                    <div className="flex items-center gap-3 px-4 py-3">
                      <span className={`text-xl font-bold flex-shrink-0 w-10 ${scoreColor(item.confidence_score)}`}>{item.confidence_score}</span>
                      <span className={`text-xs px-2 py-0.5 rounded font-semibold flex-shrink-0 ${isSeq?'bg-violet-900/50 text-violet-300':'bg-teal-900/50 text-teal-300'}`}>
                        {isSeq?'SEQ':'NON-SEQ'}
                      </span>
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-semibold text-gray-100 truncate">{item.title||'Untitled'}</div>
                        <div className="text-xs text-gray-400 mt-0.5">
                          {isSeq
                            ? <>{item.video_start_time?.toFixed(1)}s – {item.video_end_time?.toFixed(1)}s · {item._dur}s</>
                            : <>{item._dur}s total · {item.num_clips} segments</>}
                        </div>
                      </div>
                      <div className="flex gap-1 flex-wrap justify-end max-w-[130px]">
                        {(item.social_media||[]).map(p=>(
                          <span key={p} className={`text-xs px-1.5 py-0.5 rounded font-medium ${platBadge(p)}`}>{p.replace(' Shorts','').replace(' Reels','')}</span>
                        ))}
                      </div>
                      <button onClick={e=>{e.stopPropagation();setSelectedClip(isSel?null:item);}}
                        className={`flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center transition-all ${isSel?'bg-accent text-white':'bg-gray-700 hover:bg-gray-600 text-gray-300'}`}>
                        {isSel?'✕':'▶'}
                      </button>
                    </div>
                    <div className="px-4 pb-2 text-xs text-gray-400 border-t border-border/40 pt-2">
                      <span className="text-gray-500">Reason: </span>{item.reason}
                    </div>
                    {item._text&&(
                      <details className="group">
                        <summary className="px-4 py-1.5 text-xs text-gray-500 hover:text-gray-300 cursor-pointer flex items-center gap-1 select-none border-t border-border/30">
                          <span className="group-open:rotate-90 transition-transform inline-block text-xs">▶</span>
                          📝 Transcript
                          <span className="ml-auto text-gray-600 font-mono">{item._text.split(/\s+/).length} words{!isSeq&&` across ${item.num_clips} segments`}</span>
                        </summary>
                        <div className="px-4 pb-3 pt-2">
                          <div className="bg-gray-900/70 rounded-lg p-3 border border-border/50 max-h-48 overflow-y-auto">
                            <p className="text-xs text-gray-300 leading-6 whitespace-pre-wrap">{item._text}</p>
                          </div>
                        </div>
                      </details>
                    )}
                    {item.score_breakdown&&(
                      <details className="group">
                        <summary className="px-4 py-1.5 text-xs text-gray-500 hover:text-gray-300 cursor-pointer flex items-center gap-1 select-none border-t border-border/30">
                          <span className="group-open:rotate-90 transition-transform inline-block text-xs">▶</span>
                          ⭐ Score breakdown
                        </summary>
                        <div className="px-4 pb-3 pt-2">
                          <div className="grid grid-cols-3 gap-2">
                            {Object.entries(item.score_breakdown).map(([dim,s])=>(
                              <div key={dim} className="bg-gray-900 rounded p-2 text-xs">
                                <div className="text-gray-500 capitalize">{dim.replace(/_/g,' ')}</div>
                                <div className={`font-bold ${scoreColor(s*5)}`}>{s}</div>
                                {item.score_reasoning?.[dim]&&<div className="text-gray-500 text-xs mt-1 leading-4">{item.score_reasoning[dim]}</div>}
                              </div>
                            ))}
                          </div>
                          {item.weakest_factor&&<p className="text-amber-400 text-xs mt-2">⚠ Weakest: {item.weakest_factor}</p>}
                        </div>
                      </details>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })()}

        {/* ── Sequential ── */}
        {view==='sequential'&&result&&(
          <div className="max-w-3xl space-y-3">
            <div className="flex items-center justify-between mb-4"><SortBar/></div>
            {seqClips.length===0&&<p className="text-gray-500">No sequential clips.</p>}
            {sortClips(seqClips).map((clip,i)=>{
              const dur=((clip.video_end_time||0)-(clip.video_start_time||0)).toFixed(1);
              const isSel=selectedClip?.video_start_time===clip.video_start_time;
              return(
                <div key={i} onClick={()=>setSelectedClip(clip)} className={`rounded-lg border bg-surface clip-card overflow-hidden cursor-pointer transition-all ${isSel?'border-accent ring-1 ring-accent/40':'border-border hover:border-gray-600'}`}>
                  <div className="flex items-center gap-3 px-4 py-3">
                    <span className={`text-xl font-bold flex-shrink-0 w-10 ${scoreColor(clip.confidence_score)}`}>{clip.confidence_score}</span>
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-semibold text-gray-100 truncate">{clip.title||'Untitled'}</div>
                      <div className="text-xs text-gray-400 mt-0.5">
                        {clip.video_start_time?.toFixed(1)}s – {clip.video_end_time?.toFixed(1)}s · {dur}s
                        {clip.section_label&&<span className="ml-2 text-gray-500">· {clip.section_label.split('—')[0].trim()}</span>}
                      </div>
                    </div>
                    <div className="flex gap-1 flex-wrap justify-end max-w-[140px]">
                      {(clip.social_media||[]).map(p=>(
                        <span key={p} className={`text-xs px-1.5 py-0.5 rounded font-medium ${platBadge(p)}`}>{p.replace(' Shorts','').replace(' Reels','')}</span>
                      ))}
                    </div>
                    <button onClick={e=>{e.stopPropagation();setSelectedClip(isSel?null:clip);}}
                      className={`flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center transition-all ${isSel?'bg-accent text-white':'bg-gray-700 hover:bg-gray-600 text-gray-300'}`}
                      title="Open details">
                      {isSel?'✕':'▶'}
                    </button>
                  </div>
                  {/* Reasoning — always visible */}
                  <div className="px-4 pb-3 text-xs text-gray-400 border-t border-border/40 pt-2">
                    <span className="text-gray-500">Reason: </span>{clip.reason}
                  </div>
                  {/* Transcript accordion */}
                  {clip.text&&(
                    <details className="group">
                      <summary className="px-4 py-1.5 text-xs text-gray-500 hover:text-gray-300 cursor-pointer flex items-center gap-1 select-none border-t border-border/30">
                        <span className="group-open:rotate-90 transition-transform inline-block text-xs">▶</span>
                        📝 Transcript
                        <span className="ml-auto text-gray-600 font-mono">{clip.text.split(/\s+/).length} words</span>
                      </summary>
                      <div className="px-4 pb-3 pt-2">
                        <div className="bg-gray-900/70 rounded-lg p-3 border border-border/50 max-h-48 overflow-y-auto">
                          <p className="text-xs text-gray-300 leading-6 whitespace-pre-wrap">{clip.text}</p>
                        </div>
                      </div>
                    </details>
                  )}
                  {/* Score breakdown accordion */}
                  {clip.score_breakdown&&(
                    <details className="group">
                      <summary className="px-4 py-1.5 text-xs text-gray-500 hover:text-gray-300 cursor-pointer flex items-center gap-1 select-none border-t border-border/30">
                        <span className="group-open:rotate-90 transition-transform inline-block text-xs">▶</span>
                        ⭐ Score breakdown
                      </summary>
                      <div className="px-4 pb-3 pt-2 space-y-2 text-xs">
                        <div className="grid grid-cols-3 gap-2">
                          {Object.entries(clip.score_breakdown).map(([dim,s])=>(
                            <div key={dim} className="bg-gray-900 rounded p-2">
                              <div className="text-gray-500 capitalize text-xs">{dim.replace(/_/g,' ')}</div>
                              <div className={`font-bold ${scoreColor(s*5)}`}>{s}</div>
                              {clip.score_reasoning?.[dim]&&<div className="text-gray-500 text-xs mt-1 leading-4">{clip.score_reasoning[dim]}</div>}
                            </div>
                          ))}
                        </div>
                        {clip.weakest_factor&&<p className="text-amber-400">⚠ Weakest: {clip.weakest_factor} — {clip.improvise}</p>}
                      </div>
                    </details>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {/* ── Non-Sequential ── */}
        {view==='nonsequential'&&result&&(
          <div className="max-w-3xl space-y-3">
            <div className="flex items-center justify-between mb-4">
              <SortBar/>
            </div>
            {nonSeqShorts.length===0?(
              <div className="p-5 rounded-lg border border-amber-800/40 bg-amber-900/10">
                <div className="text-sm font-semibold text-amber-400 mb-2">⚠ No non-sequential clips were generated</div>
                <p className="text-xs text-amber-200/70 leading-5 mb-3">
                  This typically means Agent #2 returned sentence IDs in "S1", "S2" format (with prefix) but the assembler expected plain numbers. A fix has been applied in runner.py — the next run should work correctly.
                </p>
                <p className="text-xs text-amber-200/50 leading-5">
                  To isolate: set CLIP_MODE = "non_sequential" in Config and re-run. If still 0, check the Logs tab for "[NONSEQ] LLM returned N raw shorts" followed by "[NONSEQ] Agent #2 generated 0 shorts" — this confirms the ID parsing issue.
                </p>
              </div>
            ):(
              sortNonSeq(nonSeqShorts).map((short,i)=>{
                const isSel=selectedClip?.short_id===short.short_id;
                return(
                  <div key={i} onClick={()=>setSelectedClip(short)} className={`rounded-lg border bg-surface clip-card overflow-hidden cursor-pointer transition-all ${isSel?'border-accent ring-1 ring-accent/40':'border-border hover:border-gray-600'}`}>
                    <div className="flex items-center gap-3 px-4 py-3">
                      <span className={`text-xl font-bold flex-shrink-0 w-10 ${scoreColor(short.confidence_score)}`}>{short.confidence_score}</span>
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-semibold text-gray-100 truncate">{short.title||'Untitled'}</div>
                        <div className="text-xs text-gray-400 mt-0.5">
                          {short.total_duration?.toFixed(1)}s total · {short.num_clips} segments from different parts
                        </div>
                      </div>
                      <div className="flex gap-1 flex-wrap justify-end max-w-[140px]">
                        {(short.social_media||[]).map(p=>(
                          <span key={p} className={`text-xs px-1.5 py-0.5 rounded font-medium ${platBadge(p)}`}>{p.replace(' Shorts','').replace(' Reels','')}</span>
                        ))}
                      </div>
                      <button onClick={e=>{e.stopPropagation();setSelectedClip(isSel?null:short);}}
                        className={`flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center transition-all ${isSel?'bg-accent text-white':'bg-gray-700 hover:bg-gray-600 text-gray-300'}`}
                        title="Open details">
                        {isSel?'✕':'▶'}
                      </button>
                    </div>
                    {/* Reasoning */}
                    <div className="px-4 pb-2 text-xs text-gray-400 border-t border-border/40 pt-2">
                      <span className="text-gray-500">Reason: </span>{short.reason}
                    </div>
                    {/* Full combined transcript accordion */}
                    {short.clips?.length>0&&(
                      <details className="group">
                        <summary className="px-4 py-1.5 text-xs text-gray-500 hover:text-gray-300 cursor-pointer flex items-center gap-1 select-none border-t border-border/30">
                          <span className="group-open:rotate-90 transition-transform inline-block text-xs">▶</span>
                          📝 Full Transcript
                          <span className="ml-auto text-gray-600 font-mono">
                            {(short.clips||[]).reduce((n,c)=>n+(c.text||'').split(/\s+/).length,0)} words across {short.num_clips} segments
                          </span>
                        </summary>
                        <div className="px-4 pb-3 pt-2">
                          <div className="bg-gray-900/70 rounded-lg p-3 border border-border/50 max-h-52 overflow-y-auto space-y-3">
                            {(short.clips||[]).map((c,j)=>(
                              <div key={j}>
                                <div className="flex items-center justify-between mb-1">
                                  <span className="text-xs font-semibold text-violet-400">Segment {j+1}</span>
                                  <span className="text-xs font-mono text-gray-500">
                                    {(c.startTime??c.start_time??0).toFixed(1)}s – {(c.endTime??c.end_time??0).toFixed(1)}s
                                    {runVideoAvailable&&(
                                      <button onClick={e=>{e.stopPropagation();setSelectedClip({...short,video_start_time:c.startTime??c.start_time,video_end_time:c.endTime??c.end_time,title:`${short.title||''} — Seg ${j+1}`});}}
                                        className="ml-2 text-violet-400 hover:text-violet-300">▶</button>
                                    )}
                                  </span>
                                </div>
                                <p className="text-xs text-gray-300 leading-6">{c.text}</p>
                                {j<short.clips.length-1&&<div className="border-t border-border/30 mt-2"/>}
                              </div>
                            ))}
                          </div>
                        </div>
                      </details>
                    )}
                    {/* Segments + scores accordion */}
                    <details className="group">
                      <summary className="px-4 py-1.5 text-xs text-gray-500 hover:text-gray-300 cursor-pointer flex items-center gap-1 select-none border-t border-border/30">
                        <span className="group-open:rotate-90 transition-transform inline-block text-xs">▶</span>
                        ⭐ {short.num_clips} segments + score breakdown
                      </summary>
                      <div className="px-4 pb-3 space-y-2">
                        {(short.clips||[]).map((c,j)=>(
                          <div key={j} className="bg-gray-900 rounded p-2 text-xs">
                            <div className="flex items-center justify-between mb-1">
                              <span className="text-gray-500">Segment {j+1}</span>
                              <div className="flex items-center gap-2">
                                <span className="font-mono text-violet-300">{(c.startTime??c.start_time??0).toFixed(1)}s – {(c.endTime??c.end_time??0).toFixed(1)}s</span>
                                <span className="text-gray-500">({(c.duration??0).toFixed(1)}s)</span>
                                {runVideoAvailable&&(
                                  <button onClick={e=>{e.stopPropagation();setSelectedClip({...short,video_start_time:c.startTime??c.start_time,video_end_time:c.endTime??c.end_time,title:`${short.title||''} — Segment ${j+1}`});}}
                                    className="text-violet-400 hover:text-violet-300 text-xs">▶ play</button>
                                )}
                              </div>
                            </div>
                            <p className="text-gray-300 leading-4">{c.text}</p>
                          </div>
                        ))}
                        {short.score_breakdown&&(
                          <div className="grid grid-cols-3 gap-1.5 mt-1">
                            {Object.entries(short.score_breakdown).map(([dim,s])=>(
                              <div key={dim} className="bg-gray-900 rounded p-1.5 text-xs">
                                <div className="text-gray-500 capitalize">{dim.replace(/_/g,' ')}</div>
                                <div className={`font-bold ${scoreColor(s*5)}`}>{s}</div>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </details>
                  </div>
                );
              })
            )}
          </div>
        )}

        {/* ── Tokens ── */}
        {view==='tokens'&&result&&(
          <div className="max-w-xl space-y-4">
            <div className="grid grid-cols-2 gap-3">
              {[['Total Tokens',(usage.total_tokens||0).toLocaleString()],
                ['Input Tokens',(usage.total_input_tokens||0).toLocaleString()],
                ['Output Tokens',(usage.total_output_tokens||0).toLocaleString()],
                ['LLM Calls',usage.llm_calls||0],
                ['Cache Read',(usage.total_cache_read_tokens||0).toLocaleString()],
                ['Tokens Saved',(usage.total_tokens_saved||0).toLocaleString()],
              ].map(([k,v])=>(
                <div key={k} className="p-4 rounded-lg border border-border bg-surface">
                  <div className="text-xl font-bold text-gray-100">{v}</div>
                  <div className="text-xs text-gray-400">{k}</div>
                </div>
              ))}
            </div>
            {usage.calls?.length>0&&(
              <div className="rounded-lg border border-border overflow-hidden">
                <div className="px-4 py-2 bg-surface text-xs font-medium text-gray-400 border-b border-border">Per-Call Breakdown</div>
                <div className="overflow-x-auto">
                  <table className="w-full text-xs">
                    <thead><tr className="border-b border-border">
                      {['Caller','In','Out','Cache Read','Saved'].map(h=>(
                        <th key={h} className="px-3 py-2 text-left text-gray-400 font-medium">{h}</th>
                      ))}
                    </tr></thead>
                    <tbody>
                      {usage.calls.map((c,i)=>(
                        <tr key={i} className="border-b border-border/50 hover:bg-surface">
                          <td className="px-3 py-1.5 text-violet-300 font-mono">{c.caller}</td>
                          <td className="px-3 py-1.5 text-gray-300">{c.input_tokens?.toLocaleString()}</td>
                          <td className="px-3 py-1.5 text-gray-300">{c.output_tokens?.toLocaleString()}</td>
                          <td className="px-3 py-1.5 text-yellow-400">{c.cache_read_tokens?.toLocaleString()}</td>
                          <td className="px-3 py-1.5 text-green-400">{c.tokens_saved?.toLocaleString()}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── Raw JSON ── */}
        {view==='raw'&&result&&(
          <div className="monaco-wrap" style={{height:'500px'}}>
            <MonacoEditor value={JSON.stringify(result,null,2)} language="json" readOnly/>
          </div>
        )}
      </div>{/* closes inner scroll div */}
      {selectedClip&&<ClipDetailPanel clip={selectedClip} videoUrl={runVideoUrl} videoAvailable={runVideoAvailable} onClose={()=>setSelectedClip(null)}/>}
      </div>{/* closes flex+panel wrapper */}
      </div>{/* closes flex-1 viewer */}
    </div>{/* closes root flex */}
  );
}

// VERSIONS TAB
