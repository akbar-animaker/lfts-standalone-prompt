<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Engineering Playground</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>var require = { paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } };</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  <script>require(['vs/editor/editor.main'], function() { window.__monacoReady = true; window.dispatchEvent(new Event('monaco-ready')); });</script>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#0f0f17;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:#1a1a2e}
    ::-webkit-scrollbar-thumb{background:#3a3a5c;border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:#5a5a8c}
    .monaco-wrap{border:1px solid #2d2d4e;border-radius:6px;overflow:hidden}
    @keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
    .pulse-dot{animation:pulse-dot 1.2s ease-in-out infinite}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn .2s ease}
    @keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
    .slide-in{animation:slideIn .2s ease}
    .tab-btn{transition:all .15s;border-bottom:2px solid transparent}
    .tab-btn.active{border-bottom-color:#7c6af7;color:#a78bfa}
    .tab-btn:not(.active):hover{color:#c4b5fd}
    .stage-box{cursor:pointer;transition:filter .15s}
    .stage-box:hover rect{filter:brightness(1.25)}
    .stage-box.selected rect{stroke:#7c6af7!important;stroke-width:2!important}
    .clip-card{transition:border-color .15s}
    .clip-card:hover{border-color:#4a4a7c}
  </style>
  <script>tailwind.config={theme:{extend:{colors:{surface:'#1a1a2e',panel:'#16213e',border:'#2d2d4e',accent:'#7c6af7'}}}}</script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── API ───────────────────────────────────────────────────────────────────────
const api = {
  get:  p    => fetch(`/api${p}`).then(r=>r.json()),
  put:  (p,d)=> fetch(`/api${p}`,{method:'PUT', headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(r=>r.json()),
  post: (p,d)=> fetch(`/api${p}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(r=>r.json()),
  del:  p    => fetch(`/api${p}`,{method:'DELETE'}).then(r=>r.json()),
};

// ── Monaco Editor ─────────────────────────────────────────────────────────────
function MonacoEditor({ value, onChange, language='plaintext', readOnly=false, height='100%' }) {
  const ref=useRef(null), edRef=useRef(null), valRef=useRef(value);
  useEffect(()=>{valRef.current=value;},[value]);
  useEffect(()=>{
    const init=()=>{
      if(!ref.current||edRef.current)return;
      const ed=window.monaco.editor.create(ref.current,{
        value:valRef.current||'',language,theme:'vs-dark',automaticLayout:true,
        minimap:{enabled:false},wordWrap:'on',fontSize:13,lineHeight:20,
        scrollBeyondLastLine:false,readOnly,padding:{top:8},
        fontFamily:"'JetBrains Mono','Fira Code',Consolas,monospace",
      });
      ed.onDidChangeModelContent(()=>{ if(onChange)onChange(ed.getValue()); });
      edRef.current=ed;
    };
    if(window.__monacoReady)init();
    else window.addEventListener('monaco-ready',init,{once:true});
    return()=>{ if(edRef.current){edRef.current.dispose();edRef.current=null;} };
  },[]);
  useEffect(()=>{
    if(edRef.current&&value!==edRef.current.getValue())edRef.current.setValue(value||'');
  },[value]);
  return <div ref={ref} style={{height,width:'100%'}} />;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function Toast({msg,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3500);return()=>clearTimeout(t);},[]);
  const c={success:'bg-green-900 border-green-700',error:'bg-red-900 border-red-700',info:'bg-indigo-900 border-indigo-700'};
  return(
    <div className={`fixed bottom-6 right-6 z-50 px-4 py-3 rounded-lg border text-sm fade-in shadow-xl ${c[type]||c.info}`}>
      {msg}<button onClick={onClose} className="ml-3 opacity-60 hover:opacity-100">✕</button>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// ARCHITECTURE TAB
// ─────────────────────────────────────────────────────────────────────────────

const STAGE_DETAILS = {
  input:{
    icon:'📂',title:'Input Files',step:'Start',color:'#334155',
    tagline:'Where your content enters the system',
    nontech:`You provide two files:\n\n1. transcript.json — the full text of your video produced by AWS Transcribe. Every word has an exact timestamp (start and end time to the millisecond). This is the primary input.\n\n2. input.mp4 — the video file (optional). If provided, the system extracts one frame every 30 seconds (up to 20 frames total) and sends them to Agent #1 so it can visually see the recording format: interview-style, presenter + screen, solo talking-head, etc. The video is never processed for audio — only screenshots.\n\nEverything the AI does is based on these two files.`,
    inputs:['transcript.json — AWS Transcribe format with word-level timestamps','input.mp4 — video file (optional, enables visual context for Agent #1)'],
    outputs:['Raw transcript data → Stage 1','Video frames as images (if provided) → passed to Agent #1'],
    params:[{k:'TRANSCRIPT_PATH',v:'Path to transcript.json'},{k:'VIDEO_PATH',v:'Path to video file (leave empty to skip)'},{k:'CLIP_MODE',v:'both | sequential | non_sequential'}],
  },
  s1:{
    icon:'⚙️',title:'Stage 1 — Preprocess',step:'Stage 1',color:'#1e3a5f',
    tagline:'Turns thousands of individual words into clean, timestamped sentences',
    nontech:`AWS Transcribe gives you thousands of individual words — each with a start and end time. This stage groups them into proper sentences by splitting on punctuation (. ? !) and records the exact time each sentence begins and ends in the video.\n\nExample:\n"Hello" 0.2s + "my" 0.4s + "name" 0.6s + "is" 0.8s + "Sarah." 1.0s\n→ Sentence: "Hello my name is Sarah." — starts 0.2s, ends 1.0s\n\nIt also keeps every word with its timestamp in a flat list (all_words). This word-level timing data is used later by the Pacing Analyser to measure speaking speed and silence gaps without any AI.\n\nFinally, it detects the video language (English, Hindi, Spanish, etc.) for use in title generation.`,
    inputs:['Raw AWS Transcribe items array (words + punctuation, each with timestamps)'],
    outputs:['Sentence list — each with: index, start time, end time, text','all_words — flat list of every word with timestamps (feeds Pacing Analyser)','Video duration in seconds','Language code (e.g. en-US, hi-IN)'],
    params:[],
  },
  s1b:{
    icon:'🎙️',title:'Stage 1b — Speaker Detection',step:'Stage 1b',color:'#2d3a5f',
    tagline:'Identifies every distinct voice and draws boundaries the AI can never cross',
    nontech:`AWS Transcribe gives you one continuous stream of text with no speaker labels. But your video might have:\n• An interviewer asking questions + a guest answering\n• A main presenter + an embedded product demo clip\n• A role-play between a customer and an advisor\n\nThis stage reads the full transcript, identifies every distinct voice, and assigns each sentence to a speaker.\n\nWhy it matters: clips are NEVER allowed to cross a speaker boundary. A clip cannot mix the interviewer's question with a guest answer from a different topic. These boundaries act as invisible dividing lines in the transcript.\n\nA speakers.json reference file is written to disk immediately after this stage — even if later stages fail, you can inspect who was detected.`,
    inputs:['All sentences with timestamps'],
    outputs:['Speaker list — each with: name, role, and the sentence indices they speak','speakers.json written to disk immediately for verification','Boundary map used to constrain clip windows in Stage 2'],
    params:[{k:'SECTION_BREAK_GAP_THRESHOLD',v:'Silence gap (seconds) that marks a new speaker section'}],
  },
  s2:{
    icon:'✂️',title:'Stage 2 — Segmentation',step:'Stage 2',color:'#2d3a5f',
    tagline:'Generates every valid clip candidate, never crossing a speaker boundary',
    nontech:`Imagine highlighting every possible clip in the transcript — every combination of consecutive sentences that fits within the allowed duration range for social media.\n\nThis stage does that automatically, but with one hard rule: no clip may ever cross a speaker boundary. A clip is 100% from one speaker section — never a mix.\n\nEach candidate window is tagged with its speaker section (so agents know who is speaking), start time, end time, duration, and the full text of all sentences it contains.\n\nThe result is a list of candidate windows passed to Agent #1.`,
    inputs:['Sentence list','Speaker boundary map from Stage 1b'],
    outputs:['Candidate windows — each with: ID, start/end time, duration, text, speaker label and section type'],
    params:[{k:'SEQUENTIAL_MIN_DURATION',v:'Minimum clip length in seconds'},{k:'SOCIAL_MEDIA_MAX_DURATION',v:'Maximum clip length (YouTube Shorts ceiling = 180s)'}],
  },
  pacing:{
    icon:'📈',title:'Pacing Analysis',step:'Auto-scorer',color:'#1a2f3a',
    tagline:'Measures speaking speed, silence gaps, and filler words — no AI needed',
    nontech:`This is the only scoring dimension that never uses an AI model — it is computed purely from the word timestamps produced by Stage 1.\n\nFor each clip it measures four things:\n1. Words Per Minute (WPM) — is the speaker talking too fast, too slow, or at the right pace?\n2. Filler ratio — what fraction of words are fillers like "um", "uh", "like", "you know"?\n3. Dead-air gaps — how many pauses longer than 1.5 seconds are inside the clip?\n4. Burst ratio — what fraction of words come in very rapid runs of speech?\n\nThese four measurements combine into a Pacing Score from 0 to 20. This becomes the 7th scoring dimension alongside the 6 that the AI judges.\n\nBecause it is deterministic (no AI), the same clip always gets the exact same pacing score — no randomness, no token cost.`,
    inputs:['all_words — flat word list with timestamps from Stage 1','Clip start and end times'],
    outputs:['Pacing score 0–20 (the 7th scoring dimension)','WPM, filler ratio, dead-air gap count, burst ratio — all included in result.json'],
    params:[{k:'SCORING_WEIGHTS_RAW',v:'pacing_energy weight = 7 (fixed static weight, same for every video)'}],
  },
  a1:{
    icon:'🤖',title:'Agent #1 — Sequential Selection',step:'Step 3a',color:'#3b2d5f',
    tagline:'Picks the best uninterrupted single-window clips from all candidates',
    nontech:`This is the first AI agent doing creative work. It reads every candidate clip window and selects the ones most likely to perform well on social media.\n\nIt acts like a professional video editor asking: Does this clip have a strong hook? Does it deliver a clear insight? Can someone who never saw the full video understand it? Does it end satisfyingly?\n\nPerformance trick — prompt caching: the entire candidate window list is sent with caching enabled. After the first run, the model stores the window block in its cache. Subsequent runs (prompt edits, reruns) skip reprocessing the windows and cost roughly 90% fewer tokens.\n\nIf a video file was provided, Agent #1 also receives the extracted video frames as images so it can see the visual format of the recording.`,
    inputs:['All candidate windows with text, duration, speaker labels (prompt-cached)','Video frames as images (optional, if input.mp4 was provided)','Static scoring weights: 7 dimensions summing to 100'],
    outputs:['Selected window IDs with reasons why each was chosen'],
    params:[{k:'TARGET_SCORE',v:'Minimum score to pass selection (75/100 threshold)'},{k:'SOCIAL_MEDIA_MAX_DURATION',v:'Hard ceiling for clip length'}],
  },
  a3:{
    icon:'🔧',title:'Agent #3 — Sequential Refinement',step:'Step 3a',color:'#3b2d5f',
    tagline:'Fine-tunes clip boundaries to fix weak hooks or abrupt endings',
    nontech:`After Agent #1 selects a clip, this agent asks: can we improve it by starting a sentence earlier or ending a sentence later?\n\nFor example: if a clip opens mid-sentence, the agent searches nearby windows to find one that starts with a complete attention-grabbing opener instead.\n\nCrucial rule: it NEVER switches to a different topic. It only adjusts start/end boundaries within the same speaker section.\n\nThe Scorer runs first. If the clip already scores above the target (90/100), refinement is skipped entirely. Otherwise, one refinement pass is run (MAX_ITERATIONS = 1).`,
    inputs:['Selected clip + neighboring windows within the same speaker section (±35 seconds)','Score and per-dimension reasoning from the Scorer'],
    outputs:['Refined clip with adjusted start/end time and improved score breakdown'],
    params:[{k:'MAX_ITERATIONS_PER_SHORT_SEQUENCE',v:'1 — one refinement pass per clip'},{k:'REFINE_PAD',v:'Seconds of context exposed on each side for boundary options'}],
  },
  a2:{
    icon:'🤖',title:'Agent #2 — Non-Sequential Selection',step:'Step 3b',color:'#1f3b3b',
    tagline:'Stitches together the best moments from anywhere in the video',
    nontech:`Some of the most powerful clips are not one continuous moment — they are the best 30 seconds from different parts of an hour-long video, stitched into one coherent story.\n\nThis agent reads all individual sentences from across the ENTIRE transcript and picks combinations that tell one complete, compelling story — even if the sentences are 20 minutes apart.\n\nExample: the setup from minute 5, the key insight from minute 32, and the closing line from minute 58 could become one 45-second clip that makes perfect sense on its own.\n\nPerformance trick — prompt caching: the full sentence list is sent with caching enabled, just like Agent #1's window list. Reruns cost roughly 90% fewer tokens.`,
    inputs:['All individual sentences from the complete transcript (prompt-cached)','Static scoring weights: 7 dimensions summing to 100'],
    outputs:['Multi-segment shorts — each with: sentence IDs from anywhere in the video, total duration, reason'],
    params:[{k:'NON_SEQUENTIAL_MIN_DURATION',v:'Min total duration'},{k:'NON_SEQUENTIAL_MAX_DURATION',v:'Max total duration'}],
  },
  a4:{
    icon:'🔧',title:'Agent #4 — Non-Sequential Refinement',step:'Step 3b',color:'#1f3b3b',
    tagline:'Scores assembled clips — refinement iterations disabled by default',
    nontech:`Like Agent #3 refines single-window clips, this agent can refine multi-segment shorts by swapping, adding, or removing sentences.\n\nBy default, MAX_ITERATIONS = 0: the Scorer is run and the result is collected, but no refinement passes are attempted. The short moves on as-is.\n\nIf iterations were enabled, the agent could swap the opening sentence for one with a stronger hook, drop a trailing sentence that weakens the ending, or add a sentence providing missing context.\n\nSafety rule: it can only draw from sentences within 60 seconds of the short's existing time span — preventing unrelated content from being grafted in from elsewhere in the video.`,
    inputs:["Current short's sentence IDs + full sentence list","Score and weakest-factor analysis from the Scorer"],
    outputs:['Scored short with confidence score and breakdown (no boundary changes by default)'],
    params:[{k:'MAX_ITERATIONS_PER_SHORT_NONSEQUENCE',v:'0 — scoring only, no refinement by default'},{k:'REFINE_NONSEQ_PAD',v:'60s — max distance from current span for replacement sentences'}],
  },
  scorer:{
    icon:'⭐',title:'Scorer (used by Agents #3 and #4)',step:'Inside #3/#4',color:'#2d1f4a',
    tagline:'Gives every clip a 0–100 score across 7 dimensions — 6 AI-judged + 1 automatic',
    nontech:`Every clip is scored on 7 dimensions. Six are judged by the AI; one is computed automatically from word timestamps by the Pacing Analyser.\n\nThe 7 dimensions and their fixed weights (always sum to 100 — they do NOT change based on video type):\n\n• Hook Strength — 23 pts. Does the first sentence grab attention immediately?\n• Reframe / Insight — 18 pts. Does it make you think differently?\n• Emotional Resonance — 17 pts. Does it make you feel something?\n• Standalone Clarity — 16 pts. Can someone understand it without context?\n• Quotability — 11 pts. Is there a line you would share or remember?\n• Clean Ending — 8 pts. Does it end at a satisfying, resolved moment?\n• Pacing Energy — 7 pts. Auto-computed: speaking speed, filler words, silence gaps.\n\nA clip scoring above 90 skips refinement. Below 90, the relevant refinement agent adjusts the clip and scores again.`,
    inputs:['Clip text (first 100 words for LLM scoring)','Clip timestamps + all_words (for pacing computation)'],
    outputs:['Total score 0–100 (weighted sum of all 7 dimensions)','Per-dimension scores and AI reasoning','Weakest factor name','Specific improvement advice for the refinement agent'],
    params:[{k:'TARGET_SCORE',v:'90/100 — above this score, refinement is skipped'},{k:'SCORE_MARKET_ADJUSTMENT',v:'Global score offset applied to all dimensions'}],
  },
  a5:{
    icon:'📋',title:'Agent #5 — Final Metadata',step:'Stage 4',color:'#3b2d1f',
    tagline:'Writes a title for each clip and recommends which platforms to post on',
    nontech:`Once all clips are selected and scored, this agent writes a punchy 6–8 word title for each one.\n\nImportant: titles are written in the video's original language. If your video is in Hindi, titles come out in Hindi. If it is in Tamil, titles come out in Tamil.\n\nIt also recommends which platforms each clip should go on, based on duration:\n• Under 90 seconds → TikTok, Instagram Reels, YouTube Shorts, LinkedIn\n• 90–180 seconds → YouTube Shorts and LinkedIn only (TikTok and Instagram cap at 90s)`,
    inputs:['All clips with type, duration, score, and text preview','Language code from Stage 1'],
    outputs:['Title per clip (written in the video language)','Platforms array per clip: instagram, tiktok, youtube, linkedin'],
    params:[{k:'SOCIAL_MEDIA_MAX_DURATION',v:'Determines platform eligibility cutoffs'}],
  },
  rank:{
    icon:'📊',title:'Stage 5 — Ranking',step:'Stage 5',color:'#1e3a1e',
    tagline:'Sorts everything into a logical order for the human editor',
    nontech:`Simple but important:\n\nSequential clips are sorted by their position in the video (earliest first), making it easy for an editor to scrub through the timeline in order.\n\nNon-sequential shorts are sorted by confidence score (best clip first), so the editor sees the strongest assembled content immediately.\n\nPacing data (WPM, filler ratio, dead-air gaps, burst ratio) is attached to every clip at this point and included in the final result.json.`,
    inputs:['All clips from both sequential and non-sequential pipelines (with scores and pacing)'],
    outputs:['Ordered sequential_clips (by video start time ascending)','Ordered non_sequential_shorts (by confidence score descending)'],
    params:[],
  },
  thumb:{
    icon:'🖼️',title:'Stage 6 — Thumbnails',step:'Stage 6 (opt.)',color:'#2d2a14',
    tagline:'GPT-4o designs click-worthy 9:16 thumbnails — off by default',
    nontech:`Off by default (ENABLE_THUMBNAILS = False). When enabled, this is the only stage that uses a non-Anthropic model — GPT-4o from OpenAI.\n\nFor the top clips by confidence score (up to MAX_THUMBNAILS_PER_TYPE from each pipeline), it runs two steps:\n\nStep 1 — Art Direction (GPT-4o as visual art director)\nGPT-4o receives: the clip title, the transcript text, and a video frame grabbed at 30% into the clip. It invents a unique thumbnail concept tailored to that clip — returning a JSON with:\n• Exact color palette (hex values)\n• Headline split into bold ALL-CAPS lines\n• Accent words to highlight\n• Hook tag line\n• Background scene, graphic style, and lighting direction\n\nGPT-4o is explicitly instructed never to reuse generic templates — every thumbnail concept is original to that clip.\n\nStep 2 — Image Generation\nThe creative direction from Step 1 drives the image model to render a finished 9:16 vertical thumbnail, preserving the subject's face from the reference frame. The result is uploaded to S3 and stored as thumbnail_url on the clip.\n\nRequires: OPENAI_API_KEY env var + openai, Pillow, boto3 packages. If any are missing, this stage is silently skipped.`,
    inputs:['Top clips by confidence score (up to MAX_THUMBNAILS_PER_TYPE per type)','Video frame at 30% into clip duration (extracted at Input stage by ffmpeg)','Clip title and full transcript text'],
    outputs:['thumbnail_url field added to each processed clip in result.json','9:16 vertical thumbnail image (YouTube Shorts / Reels / TikTok format) uploaded to S3'],
    params:[
      {k:'ENABLE_THUMBNAILS',v:'False by default — set True to activate'},
      {k:'THUMBNAIL_RESPONSE_MODEL',v:'gpt-4o (OpenAI) — art direction + image generation'},
      {k:'MAX_THUMBNAILS_PER_TYPE',v:'2 — max top clips per type (seq + non-seq) that get thumbnails'},
      {k:'OPENAI_API_KEY',v:'Required — set via environment variable'},
      {k:'S3_BUCKET',v:'anim-user-uploads — S3 bucket for thumbnail uploads'},
    ],
  },
  output:{
    icon:'📄',title:'Output Files',step:'Done',color:'#1a3322',
    tagline:'Final deliverable — JSON files with every clip ready to cut',
    nontech:`The pipeline writes two files:\n\nresult.json — contains every selected clip with:\n• Title (in the video language)\n• Exact start and end time\n• Confidence score (0–100) and per-dimension breakdown\n• Pacing details (WPM, filler ratio, dead-air gaps, burst ratio)\n• Which platforms to post on\n• The reason it was selected\n• How many refinement iterations it went through\n• Static scoring weights (dimension_weights)\n• thumbnail_url — S3 URL of the generated thumbnail (if Stage 6 was enabled; empty string otherwise)\n\nspeakers.json — shows which parts of the video belong to which speaker, with contiguous time ranges and full transcripts. Useful for verifying speaker detection before re-running.`,
    inputs:['Ranked clips from both pipelines','Pacing data per clip','thumbnail_url per clip (if Stage 6 ran)','Token usage summary'],
    outputs:['result.json (sequential_clips + non_sequential_shorts + dimension_weights + speakers + metadata)','speakers.json (per-speaker segments, contiguous time ranges, and full transcripts)'],
    params:[{k:'OUTPUT_PATH',v:'Where result.json is written'},{k:'SPEAKERS_OUTPUT_PATH',v:'Where speakers.json is written'}],
  },
};

function ArchitectureTab() {
  const [sel, setSel] = useState(null);

  const stages = [
    {id:'input',  color:'#334155'},{id:'s1',   color:'#1e3a5f'},
    {id:'s1b',   color:'#2d3a5f'},{id:'s2',   color:'#2d3a5f'},
    {id:'pacing',color:'#1a2f3a'},
    {id:'a1',    color:'#3b2d5f'},{id:'a3',   color:'#3b2d5f'},
    {id:'a2',    color:'#1f3b3b'},{id:'a4',   color:'#1f3b3b'},
    {id:'scorer',color:'#2d1f4a'},
    {id:'a5',    color:'#3b2d1f'},{id:'rank', color:'#1e3a1e'},
    {id:'thumb', color:'#2d2a14'},{id:'output',color:'#1a3322'},
  ];

  const grid = [
    // [id, col, row]
    ['input',0,0],['s1',1,0],['s1b',2,0],['s2',3,0],
    ['pacing',0,1],['a1',1,1],['a3',2,1],['a2',3,1],['a4',4,1],
    ['scorer',0,2],['a5',1,2],['rank',2,2],['thumb',3,2],['output',4,2],
  ];

  const W=128,H=72,GX=22,GY=18,PX=18,PY=16;
  const svgW = PX*2 + 5*(W+GX);
  const svgH = PY*2 + 3*(H+GY);

  const pos = (col,row) => ({ x: PX+col*(W+GX), y: PY+row*(H+GY) });
  const pmap = {};
  grid.forEach(([id,col,row])=>{ pmap[id]=pos(col,row); });

  const arrows = [
    ['input','s1'],['s1','s1b'],['s1b','s2'],
    ['s2','a1'],['a1','a3'],
    ['s2','a2'],['a2','a4'],
    ['a3','a5'],['a4','a5'],
    ['scorer','a3'],['scorer','a4'],
    ['pacing','scorer'],
    ['a5','rank'],['rank','thumb'],['thumb','output'],
  ];

  const det = sel ? STAGE_DETAILS[sel] : null;

  return (
    <div className="flex h-full fade-in" style={{minHeight:'600px'}}>
      {/* Diagram */}
      <div className={`flex-1 p-6 overflow-auto transition-all ${sel?'pr-2':''}`}>
        <h2 className="text-lg font-semibold text-gray-200 mb-1">Pipeline Architecture</h2>
        <p className="text-sm text-gray-400 mb-4">
          Click any stage for a plain-English explanation of what it does.
        </p>
        <svg width={svgW} height={svgH} xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="ah" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
              <polygon points="0 0,8 3,0 6" fill="#4b5563"/>
            </marker>
            <marker id="ahv" markerWidth="6" markerHeight="8" refX="3" refY="7" orient="auto">
              <polygon points="0 0,3 8,6 0" fill="#4b5563"/>
            </marker>
          </defs>
          {arrows.map(([f,t])=>{
            const a=pmap[f],b=pmap[t]; if(!a||!b)return null;
            // Vertical arrow: same column or target is behind source
            if(Math.abs((a.x+W/2)-(b.x+W/2))<W/2 && b.y > a.y){
              const vx=a.x+W/2, vy1=a.y+H, vy2=b.y;
              return <line key={`${f}-${t}`} x1={vx} y1={vy1} x2={vx} y2={vy2+2} stroke="#4b5563" strokeWidth="1.5" markerEnd="url(#ahv)"/>;
            }
            const ax=a.x+W, ay=a.y+H/2, bx=b.x, by=b.y+H/2;
            if(Math.abs(ay-by)<4)
              return <line key={`${f}-${t}`} x1={ax} y1={ay} x2={bx-2} y2={by} stroke="#4b5563" strokeWidth="1.5" markerEnd="url(#ah)"/>;
            const mx=(ax+bx)/2;
            return <path key={`${f}-${t}`} d={`M${ax},${ay} C${mx},${ay} ${mx},${by} ${bx-2},${by}`} fill="none" stroke="#4b5563" strokeWidth="1.5" markerEnd="url(#ah)"/>;
          })}
          {grid.map(([id,col,row])=>{
            const d=STAGE_DETAILS[id]; if(!d)return null;
            const {x,y}=pos(col,row);
            const isSel=sel===id;
            return(
              <g key={id} className={`stage-box${isSel?' selected':''}`} onClick={()=>setSel(sel===id?null:id)}>
                <rect x={x} y={y} width={W} height={H} rx="8"
                  fill={d.color} stroke={isSel?'#7c6af7':'#4b5563'} strokeWidth={isSel?2:1}/>
                {isSel&&<rect x={x-1} y={y-1} width={W+2} height={H+2} rx="9" fill="none" stroke="#7c6af7" strokeWidth="1" opacity=".4"/>}
                <text x={x+W/2} y={y+18} textAnchor="middle" fontSize="18">{d.icon}</text>
                <text x={x+W/2} y={y+36} textAnchor="middle" fill="#e2e8f0" fontSize="10.5" fontWeight="600">{d.title.split('—')[0].replace(/Stage \w+ /,'').trim().substring(0,18)}</text>
                <text x={x+W/2} y={y+50} textAnchor="middle" fill="#94a3b8" fontSize="8.5">{d.step}</text>
                <text x={x+W/2} y={y+62} textAnchor="middle" fill="#64748b" fontSize="7.5">click for details</text>
              </g>
            );
          })}
        </svg>

        {/* Legend */}
        <div className="mt-6 flex flex-wrap gap-3">
          {[
            {color:'#1e3a5f',label:'Core pipeline'},
            {color:'#1a2f3a',label:'Auto pacing (no AI)'},
            {color:'#3b2d5f',label:'Sequential agents'},
            {color:'#1f3b3b',label:'Non-sequential agents'},
            {color:'#2d1f4a',label:'Scorer + Metadata'},
            {color:'#2d2a14',label:'GPT-4o / OpenAI (optional)'},
          ].map(i=>(
            <div key={i.label} className="flex items-center gap-1.5 text-xs text-gray-400">
              <div className="w-3 h-3 rounded" style={{background:i.color,border:'1px solid #4b5563'}}/>
              {i.label}
            </div>
          ))}
        </div>
      </div>

      {/* Detail panel */}
      {det && (
        <div className="w-96 flex-shrink-0 border-l border-border bg-surface overflow-y-auto slide-in">
          <div className="sticky top-0 bg-surface border-b border-border px-4 py-3 flex items-start justify-between gap-2 z-10">
            <div className="flex items-start gap-2">
              <span className="text-2xl">{det.icon}</span>
              <div>
                <div className="text-sm font-bold text-gray-100 leading-snug">{det.title}</div>
                <div className="text-xs text-violet-400 mt-0.5">{det.tagline}</div>
              </div>
            </div>
            <button onClick={()=>setSel(null)} className="text-gray-500 hover:text-gray-300 flex-shrink-0 text-lg mt-0.5">✕</button>
          </div>
          <div className="p-4 space-y-4 text-sm">
            {/* Plain English */}
            <div>
              <div className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">What it does</div>
              <div className="text-gray-300 text-xs leading-5 whitespace-pre-line bg-gray-900/50 rounded-lg p-3 border border-border">
                {det.nontech}
              </div>
            </div>
            {/* Input / Output */}
            <div className="grid grid-cols-2 gap-3">
              <div>
                <div className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">📥 Input</div>
                <ul className="space-y-1">
                  {det.inputs.map((i,idx)=>(<li key={idx} className="text-xs text-gray-300 flex gap-1"><span className="text-gray-600 flex-shrink-0">•</span>{i}</li>))}
                </ul>
              </div>
              <div>
                <div className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">📤 Output</div>
                <ul className="space-y-1">
                  {det.outputs.map((o,idx)=>(<li key={idx} className="text-xs text-green-300 flex gap-1"><span className="text-gray-600 flex-shrink-0">•</span>{o}</li>))}
                </ul>
              </div>
            </div>
            {/* Config params */}
            {det.params && det.params.length > 0 && (
              <div>
                <div className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">⚙️ Key Config</div>
                <div className="space-y-1.5">
                  {det.params.map(p=>(
                    <div key={p.k} className="flex gap-2 text-xs">
                      <code className="text-violet-300 font-mono flex-shrink-0">{p.k}</code>
                      <span className="text-gray-400">{p.v}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// CODE TAB — editable standalone.py with hot-reload
// ─────────────────────────────────────────────────────────────────────────────
function CodeTab({ code, onRunWithCode, running }) {
  const [draft, setDraft] = useState(code || '');

  useEffect(() => { setDraft(code || ''); }, [code]);

  const isModified = draft !== code;

  const handleDownload = () => {
    const blob = new Blob([draft], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'standalone.py';
    a.click();
    URL.revokeObjectURL(url);
  };

  const handleReset = () => {
    if(confirm('Discard session edits and revert to the saved code?')) setDraft(code);
  };

  return (
    <div className="flex flex-col fade-in" style={{height:'calc(100vh - 112px)'}}>
      {/* Toolbar */}
      <div className="flex items-center justify-between px-4 py-2 border-b border-border bg-surface flex-shrink-0">
        <div className="flex items-center gap-3">
          <span className="text-sm font-semibold text-gray-200 font-mono">standalone.py</span>
          <span className="text-xs text-gray-500">Session-only edits — not saved to disk</span>
          {isModified && <span className="text-xs text-amber-400 font-medium">● modified</span>}
        </div>
        <div className="flex gap-2">
          <button onClick={handleDownload} title="Download current editor state as standalone.py"
            className="px-3 py-1.5 text-xs rounded font-medium transition-colors bg-gray-800 hover:bg-gray-700 text-gray-300 flex items-center gap-1">
            ⬇ Download
          </button>
          <button onClick={handleReset} disabled={!isModified}
            className={`px-3 py-1.5 text-xs rounded font-medium transition-colors ${isModified ? 'bg-gray-700 hover:bg-gray-600 text-gray-300' : 'bg-gray-800 text-gray-500 cursor-not-allowed'}`}>
            Reset
          </button>
          <button onClick={() => onRunWithCode(draft)} disabled={running}
            className={`flex items-center gap-1.5 px-4 py-1.5 text-xs rounded font-semibold transition-colors ${!running ? 'bg-accent hover:bg-violet-600 text-white shadow shadow-violet-900/40' : 'bg-gray-700 text-gray-500 cursor-not-allowed'}`}>
            {running ? '⏳ Running…' : '▶ Run with Changes'}
          </button>
        </div>
      </div>
      {/* Monaco editor — Python mode */}
      <div className="flex-1 monaco-wrap" style={{borderRadius:0, border:'none', minHeight:0}}>
        <MonacoEditor key="code-editor" value={draft} onChange={setDraft} language="python"/>
      </div>
      {/* Status bar */}
      <div className="px-4 py-1.5 border-t border-border bg-surface text-xs text-gray-500 flex justify-between flex-shrink-0">
        <span>
          Edits are <span className="text-amber-400 font-medium">session-only</span> — applied to the run via exec, never written to disk.
          Refresh to revert to the saved version.
        </span>
        <span className="font-mono">{draft.split('\n').length.toLocaleString()} lines · {draft.length.toLocaleString()} chars</span>
      </div>
    </div>
  );
}

// PROMPTS TAB — ordered to match pipeline flow
// ─────────────────────────────────────────────────────────────────────────────
const PROMPT_LABELS = {
  SPEAKER_DETECTION_PROMPT:  { label:'Speaker Detector',          icon:'🎙️', step:'Stage 1b', desc:'Assigns every sentence to a speaker' },
  SEQUENCE_PROMPT:           { label:'Sequential Selection',      icon:'🎯', step:'Agent #1', desc:'Picks the best single-window clips' },
  REFINE_PROMPT:             { label:'Sequential Refinement',     icon:'🔧', step:'Agent #3', desc:'Adjusts clip start/end boundaries (1 pass)' },
  NONSEQUENCE_PROMPT:        { label:'Non-Sequential Selection',  icon:'🎬', step:'Agent #2', desc:'Assembles clips from scattered sentences' },
  REFINE_NONSEQ_PROMPT:      { label:'Non-Sequential Refinement', icon:'🔧', step:'Agent #4', desc:'Scores shorts (0 refinement passes by default)' },
  SCORER_PROMPT:             { label:'Clip Scorer',               icon:'⭐', step:'Scorer',   desc:'Scores clips on 6 AI dimensions + 1 auto pacing (0–100)' },
  METADATA_PROMPT:           { label:'Metadata Generator',        icon:'📋', step:'Agent #5', desc:'Generates titles + platform recommendations' },
  THUMBNAIL_ART_DIRECTOR_SYSTEM: { label:'Thumbnail Art Director', icon:'🖼️', step:'Stage 6', desc:'Invents the thumbnail creative concept (JSON)' },
  THUMBNAIL_IMAGE_INSTRUCTION:   { label:'Thumbnail Image Brief',  icon:'🎨', step:'Stage 6', desc:'Final instruction sent to the image model' },
};

function PromptsTab({ prompts, drafts, onDraftChange, onReset }) {
  const [selected,setSelected] = useState('SPEAKER_DETECTION_PROMPT');

  const currentValue = drafts[selected] ?? prompts[selected] ?? '';
  const isModified = key => (drafts[key] ?? prompts[key]) !== prompts[key];
  const anyModified = Object.keys(PROMPT_LABELS).some(isModified);

  const handleReset = () => {
    if(!confirm(`Reset "${PROMPT_LABELS[selected]?.label}" to the current saved value?`)) return;
    onReset(selected);
  };

  const handleDownloadAll = () => {
    const lines = Object.entries(PROMPT_LABELS).map(([key,meta]) => {
      const val = drafts[key] ?? prompts[key] ?? '';
      return `# ── ${meta.label} (${key}) ──\n${val}`;
    }).join('\n\n' + '─'.repeat(60) + '\n\n');
    const blob = new Blob([lines], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'prompts_session.txt'; a.click();
    URL.revokeObjectURL(url);
  };

  return(
    <div className="flex fade-in" style={{height:'calc(100vh - 112px)'}}>
      {/* Sidebar */}
      <div className="w-60 flex-shrink-0 border-r border-border overflow-y-auto flex flex-col">
        <div className="px-3 py-2 border-b border-border text-xs text-gray-500 font-medium uppercase tracking-wide flex items-center justify-between">
          <span>Pipeline Order</span>
          {anyModified && <span className="text-amber-400 text-xs">● modified</span>}
        </div>
        {Object.entries(PROMPT_LABELS).map(([key,meta])=>(
          <button key={key} onClick={()=>setSelected(key)}
            className={`w-full text-left px-3 py-2.5 border-b border-border/50 transition-all ${selected===key?'bg-indigo-900/40 border-l-2 border-l-accent':'hover:bg-surface'}`}>
            <div className="flex items-center gap-2">
              <span className="text-base">{meta.icon}</span>
              <div className="min-w-0">
                <div className={`text-xs font-semibold ${selected===key?'text-violet-300':'text-gray-300'}`}>{meta.label}</div>
                <div className="text-xs text-gray-500 mt-0.5">{meta.step} · {meta.desc}</div>
              </div>
            </div>
            {isModified(key) && <div className="text-xs text-amber-400 mt-1 pl-6">● modified this session</div>}
          </button>
        ))}
      </div>
      {/* Editor */}
      <div className="flex-1 flex flex-col min-w-0">
        <div className="flex items-center justify-between px-4 py-2 border-b border-border bg-surface">
          <div>
            <span className="text-sm font-semibold text-gray-200">{PROMPT_LABELS[selected]?.label}</span>
            <span className="ml-2 text-xs text-gray-500 font-mono">{selected}</span>
            {isModified(selected) && <span className="ml-2 text-xs text-amber-400">● modified</span>}
          </div>
          <div className="flex gap-2">
            <button onClick={handleDownloadAll} title="Download all prompts (with session edits)"
              className="px-3 py-1.5 text-xs rounded bg-gray-800 hover:bg-gray-700 text-gray-300 transition-colors flex items-center gap-1">
              ⬇ Download
            </button>
            <button onClick={handleReset} disabled={!isModified(selected)}
              className={`px-3 py-1.5 text-xs rounded transition-colors ${isModified(selected)?'bg-gray-700 hover:bg-gray-600 text-gray-300':'bg-gray-800 text-gray-600 cursor-not-allowed'}`}>
              Reset
            </button>
          </div>
        </div>
        <div className="flex-1 monaco-wrap" style={{borderRadius:0,border:'none'}}>
          <MonacoEditor key={selected} value={currentValue} onChange={v=>onDraftChange(selected,v)} language="markdown"/>
        </div>
        <div className="px-4 py-2 border-t border-border bg-surface text-xs text-gray-500 flex justify-between">
          <span>
            Edits are <span className="text-amber-400 font-medium">session-only</span> — used in the next run but not saved to disk.
            Refresh to revert. Variables like <code className="text-violet-300">{'{video_category}'}</code> are filled at runtime.
          </span>
          <span>{currentValue.length} chars</span>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// CONFIG TAB
// ─────────────────────────────────────────────────────────────────────────────
// Coerce config values (real bools, or "true"/"false" strings from storage) to a JS bool.
const _cfgBool = v => v===true || v==='true' || v===1 || v==='1';

function ConfigTab({ config, schema, onSave, onReset, onFetchProject, fetching }) {
  const [draft,setDraft]=useState({});
  const [saving,setSaving]=useState(false);
  const [projectId,setProjectId]=useState('');
  useEffect(()=>{setDraft({...config});},[config]);

  const groups={};
  Object.entries(schema).forEach(([key,meta])=>{
    if(!groups[meta.group])groups[meta.group]=[];
    groups[meta.group].push({key,...meta});
  });
  const isDirty=Object.keys(draft).some(k=>String(draft[k])!==String(config[k]));
  const handleSave=async()=>{
    setSaving(true);
    try{
      const payload={...draft};
      ['CLAUDE_API_KEY','OPENAI_API_KEY'].forEach(k=>{
        const v=payload[k];
        if(typeof v==='string'&&(v.includes('...')||v==='***'))delete payload[k];
      });
      await onSave(payload);
    }finally{setSaving(false);}
  };
  const gi={'Model':'🤖','Pipeline':'⚙️','Scoring':'⭐','Refinement':'🔧','Video':'🎬','Files':'📂','Thumbnails':'🖼️'};

  const renderField=({key,label,type})=>(
    <div key={key}>
      <label className="block text-xs font-medium text-gray-400 mb-1">
        {label}{String(draft[key])!==String(config[key])&&<span className="ml-1 text-amber-400">●</span>}
      </label>
      {type==='bool'?(
        <button type="button" role="switch" aria-checked={_cfgBool(draft[key])}
          onClick={()=>setDraft(d=>({...d,[key]:!_cfgBool(d[key])}))}
          className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${_cfgBool(draft[key])?'bg-accent':'bg-gray-700'}`}>
          <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${_cfgBool(draft[key])?'translate-x-6':'translate-x-1'}`}/>
        </button>
      ):key==='CLAUDE_API_KEY'?(
        <input type="password" className="w-full bg-gray-900 border border-border rounded px-3 py-1.5 text-sm font-mono text-gray-200 outline-none focus:border-accent"
          value={draft[key]||''} onChange={e=>setDraft(d=>({...d,[key]:e.target.value}))} placeholder="sk-ant-..."/>
      ):key==='OPENAI_API_KEY'?(
        <input type="password" className="w-full bg-gray-900 border border-border rounded px-3 py-1.5 text-sm font-mono text-gray-200 outline-none focus:border-accent"
          value={draft[key]||''} onChange={e=>setDraft(d=>({...d,[key]:e.target.value}))} placeholder="sk-..."/>
      ):key==='CLIP_MODE'?(
        <select className="w-full bg-gray-900 border border-border rounded px-3 py-1.5 text-sm text-gray-200 outline-none focus:border-accent"
          value={draft[key]||'both'} onChange={e=>setDraft(d=>({...d,[key]:e.target.value}))}>
          <option value="both">both</option>
          <option value="sequential">sequential only</option>
          <option value="non_sequential">non_sequential only</option>
        </select>
      ):(
        <input type={type==='int'||type==='float'?'number':'text'} step={type==='float'?'0.1':'1'}
          className="w-full bg-gray-900 border border-border rounded px-3 py-1.5 text-sm font-mono text-gray-200 outline-none focus:border-accent"
          value={draft[key]??''} onChange={e=>setDraft(d=>({...d,[key]:e.target.value}))}/>
      )}
    </div>
  );

  return(
    <div className="p-6 fade-in max-w-4xl">
      <div className="flex items-center justify-between mb-6">
        <div><h2 className="text-lg font-semibold text-gray-200">Pipeline Configuration</h2>
          <p className="text-sm text-gray-400 mt-0.5">Changes apply to the next run.</p></div>
        <div className="flex gap-2">
          <button onClick={()=>{if(confirm('Reset all config to defaults?'))onReset();}}
            className="px-3 py-1.5 text-sm rounded bg-gray-700 hover:bg-gray-600 text-gray-300 transition-colors">Reset All</button>
          <button onClick={handleSave} disabled={!isDirty||saving}
            className={`px-4 py-1.5 text-sm rounded font-medium transition-colors ${isDirty&&!saving?'bg-accent hover:bg-violet-600 text-white':'bg-gray-700 text-gray-500 cursor-not-allowed'}`}>
            {saving?'Saving…':'Save Config'}
          </button>
        </div>
      </div>
      {Object.entries(groups).filter(a => a[0] !== 'Refinement').map(([group,fields])=>(
        <div key={group} className="mb-5 rounded-lg border border-border overflow-hidden">
          <div className="px-4 py-2 bg-surface border-b border-border flex items-center gap-2">
            <span>{gi[group]||'⚙️'}</span><span className="text-sm font-semibold text-gray-300">{group}</span>
          </div>

          {group==='Files' ? (
            /* ── Files group: URL inputs (left) + Project ID fetch (right) ── */
            <div className="p-4">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {/* Left: URL inputs */}
                <div className="space-y-4">
                  {fields.filter(f=>['TRANSCRIPT_PATH','VIDEO_PATH','OUTPUT_PATH'].includes(f.key)).map(renderField)}
                </div>
                {/* Right: Fetch by Project ID */}
                <div>
                  <div className="rounded-lg border border-indigo-800/60 bg-indigo-950/30 p-4 h-full">
                    <div className="text-xs font-semibold text-indigo-300 mb-3 flex items-center gap-1.5">
                      ⬇ Fetch by Project ID
                    </div>
                    <div className="space-y-3">
                      <div>
                        <label className="block text-xs text-gray-500 mb-1">Project ID</label>
                        <input
                          value={projectId} onChange={e=>setProjectId(e.target.value)}
                          onKeyDown={e=>{ if(e.key==='Enter'&&projectId.trim()&&!fetching) onFetchProject(projectId); }}
                          placeholder="e.g. abc123xyz"
                          className="w-full bg-gray-900 border border-border rounded px-3 py-1.5 text-sm font-mono text-gray-200 outline-none focus:border-indigo-500"
                        />
                      </div>
                      <button
                        onClick={()=>onFetchProject(projectId)}
                        disabled={fetching||!projectId.trim()}
                        className={`w-full py-2 text-sm rounded font-semibold transition-colors ${fetching||!projectId.trim()?'bg-gray-700 text-gray-500 cursor-not-allowed':'bg-indigo-600 hover:bg-indigo-500 text-white'}`}>
                        {fetching?'⬇ Fetching…':'⬇ Fetch Files'}
                      </button>
                      <p className="text-xs text-gray-500 leading-4">
                        Resolves transcript + video URLs for this project and auto-fills the fields on the left.
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          ) : (
            <div className="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
              {fields.filter(a => a.key !== 'SCORE_MARKET_ADJUSTMENT').map(renderField)}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// LOGS TAB
